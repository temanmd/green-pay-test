# PostgreSQL. Параметры подключения берём из ENV, поэтому один и тот же конфиг
# работает и локально (defaults → localhost), и в Docker (POSTGRES_HOST=db).
default: &default
  adapter: postgresql
  encoding: unicode
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS", 5) %>
  host: <%= ENV.fetch("POSTGRES_HOST", "localhost") %>
  port: <%= ENV.fetch("POSTGRES_PORT", 5432) %>
  username: <%= ENV.fetch("POSTGRES_USER", "postgres") %>
  password: <%= ENV.fetch("POSTGRES_PASSWORD", "postgres") %>

development:
  <<: *default
  database: <%= ENV.fetch("POSTGRES_DB", "green_pay_test_development") %>

test:
  <<: *default
  database: <%= ENV.fetch("POSTGRES_TEST_DB", "green_pay_test_test") %>

production:
  <<: *default
  database: <%= ENV.fetch("POSTGRES_DB", "green_pay_test_production") %>
